<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Empire</title>
    <style>
        :root { --bg: #050505; --card: #151515; --gold: #d4af37; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; }
        .header { text-align: center; font-size: 20px; color: var(--gold); padding: 15px; position: sticky; top: 0; background: rgba(5,5,5,0.9); z-index: 10; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .card img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; }
        .btn { border: none; padding: 5px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 48%; }
        .buy { background: var(--gold); }
        .sell { background: #444; color: #fff; }
        .clicker { background: #1a1a1a; padding: 20px; text-align: center; border: 2px solid var(--gold); border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header" id="bal">💰 $30,000</div>
    
    <div class="clicker">
        <button class="btn buy" style="width:100%; height:50px" onclick="tap()">КЛИК (+$<span id="clickValDisp">10</span>)</button>
        <p id="upgradeText">Апгрейд: $100 (Сила: +10)</p>
        <button class="btn buy" id="upgradeBtn" onclick="upgrade()">КУПИТЬ АПГРЕЙД</button>
    </div>

    <div id="content"></div>

    <script>
        let balance = 30000; let clickVal = 10; let upgradeCost = 100;
        let inv = {};

        // (Данные товаров здесь остаются теми же, сократил для краткости в ответе)
        const data = {
            "🏎 Тачки (20)": [{n:"BMW",p:10000,img:"https://images.unsplash.com/photo-1555215695-3004980ad54e"},{n:"Audi",p:12000,img:"https://images.unsplash.com/photo-1541348263662-e068662d82ab"},{n:"Mers",p:15000,img:"https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8"},{n:"Ferrari",p:50000,img:"https://images.unsplash.com/photo-1592198084033-ade902d1aae0"},{n:"Lambo",p:60000,img:"https://images.unsplash.com/photo-1544829099-b9a0c07fad1a"},{n:"Porsche",p:40000,img:"https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e"},{n:"Bugatti",p:200000,img:"https://images.unsplash.com/photo-1600706432502-75a0e2b3b99a"},{n:"Tesla",p:35000,img:"https://images.unsplash.com/photo-1560958089-b8a1929cea89"},{n:"Aston",p:80000,img:"https://images.unsplash.com/photo-1603584173870-7f23fdae1dda"},{n:"Ford",p:8000,img:"https://images.unsplash.com/photo-1506377872008-6645d9d29ef7"},{n:"Honda",p:7000,img:"https://images.unsplash.com/photo-1591465203743-a1170d30b957"},{n:"Toyota",p:9000,img:"https://images.unsplash.com/photo-1621351182283-e07e868c2929"},{n:"Bentley",p:110000,img:"https://images.unsplash.com/photo-1621007947382-cc347941150e"},{n:"Rolls",p:150000,img:"https://images.unsplash.com/photo-1617531653332-bd46c24f2068"},{n:"McLaren",p:120000,img:"https://images.unsplash.com/photo-1621135802920-133df287f89c"},{n:"Jaguar",p:45000,img:"https://images.unsplash.com/photo-1563720223185-11003d516935"},{n:"Maserati",p:48000,img:"https://images.unsplash.com/photo-1619362280286-f1f8fd5032ed"},{n:"Lotus",p:38000,img:"https://images.unsplash.com/photo-1520050206274-a1ae446cb3cc"},{n:"Pagani",p:250000,img:"https://images.unsplash.com/photo-1583121274602-3e2820c69888"},{n:"Koenig",p:300000,img:"https://images.unsplash.com/photo-1632245889029-e406faaa34cd"}],
            "🏡 Дома (5)": [{n:"Коттедж",p:20000,img:"https://images.unsplash.com/photo-1518780664697-55e3ad937233"},{n:"Вилла",p:100000,img:"https://images.unsplash.com/photo-1600585154526-990dced4db0d"},{n:"Особняк",p:500000,img:"https://images.unsplash.com/photo-1600596542815-ffad4c1539a9"},{n:"Замок",p:1000000,img:"https://images.unsplash.com/photo-1549517045-5bc9c47e7a3e"},{n:"Шале",p:80000,img:"https://images.unsplash.com/photo-1502784444187-359ac186c5bb"}],
            "🏢 КВ (5)": [{n:"Студия",p:15000,img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688"},{n:"1-комн",p:25000,img:"https://images.unsplash.com/photo-1522708323590-d24dbb6b0267"},{n:"2-комн",p:40000,img:"https://images.unsplash.com/photo-1506744038136-46273834b3fb"},{n:"Лофт",p:70000,img:"https://images.unsplash.com/photo-1493809842364-79357021175b"},{n:"Пентхаус",p:200000,img:"https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd"}],
            "⚓ Яхты (5)": [{n:"Катер",p:30000,img:"https://images.unsplash.com/photo-1567899378494-47b22a2ae96a"},{n:"Яхта S",p:150000,img:"https://images.unsplash.com/photo-1621275471769-e6aa344546d5"},{n:"Яхта M",p:500000,img:"https://images.unsplash.com/photo-1521747116042-5a810fda9664"},{n:"Яхта L",p:2000000,img:"https://images.unsplash.com/photo-1536761066603-9110d7a641a9"},{n:"Гига-Яхта",p:10000000,img:"https://images.unsplash.com/photo-1599423300746-b62533397164"}],
            "🛩 Самолёты (5)": [{n:"Cessna",p:100000,img:"https://images.unsplash.com/photo-1540962351504-03099e0a754b"},{n:"Вертолет",p:250000,img:"https://images.unsplash.com/photo-1508614589041-895b88991e3e"},{n:"Джет S",p:2000000,img:"https://images.unsplash.com/photo-1569154941061-e231b4725ef1"},{n:"Джет M",p:8000000,img:"https://images.unsplash.com/photo-1610647752706-38290130635f"},{n:"Лайнер",p:50000000,img:"https://images.unsplash.com/photo-1436891620584-8142340570b2"}],
            "⌚ Часы (7)": [{n:"Rolex1",p:10000,img:"https://images.unsplash.com/photo-1523170335258-f5ed11844a49"},{n:"Rolex2",p:15000,img:"https://images.unsplash.com/photo-1587836374826-0db5a3abb5e6"},{n:"Omega",p:8000,img:"https://images.unsplash.com/photo-1524592094714-0f0654e20314"},{n:"Cartier",p:12000,img:"https://images.unsplash.com/photo-1606825595808-41022839956d"},{n:"Hublot",p:20000,img:"https://images.unsplash.com/photo-1614164185128-e4ec99c436d7"},{n:"Seiko",p:2000,img:"https://images.unsplash.com/photo-1594736768687-350711589178"},{n:"Casio",p:500,img:"https://images.unsplash.com/photo-1605335445203-d022b7a8a65f"}],
            "🖼 Картины (4)": [{n:"Абстракт",p:5000,img:"https://images.unsplash.com/photo-1541701494587-cb58502866ab"},{n:"Масло",p:12000,img:"https://images.unsplash.com/photo-1577083552431-6e5fd01aa342"},{n:"Портрет",p:25000,img:"https://images.unsplash.com/photo-1580136579312-94651dfd596d"},{n:"Пейзаж",p:8000,img:"https://images.unsplash.com/photo-1549490349-8643362247b5"}],
            "📈 Акции (5)": [{n:"Apple",p:200,img:"https://images.unsplash.com/photo-1611186871348-b1ce696e52c9"},{n:"Tesla",p:300,img:"https://images.unsplash.com/photo-1619441207936-33c9284241aa"},{n:"Google",p:400,img:"https://images.unsplash.com/photo-1573804633927-bf81907406a6"},{n:"Amazon",p:500,img:"https://images.unsplash.com/photo-1523474253046-d72741d5d0d2"},{n:"NVIDIA",p:600,img:"https://images.unsplash.com/photo-1591405351957-89d7e0053d7d"}],
            "₿ Крипта (5)": [{n:"BTC",p:60000,img:"https://images.unsplash.com/photo-1518546305927-5a555bb7020d"},{n:"ETH",p:3000,img:"https://images.unsplash.com/photo-1605792657660-596af9009e82"},{n:"TON",p:7,img:"https://images.unsplash.com/photo-1621416895569-f886f44d246c"},{n:"SOL",p:150,img:"https://images.unsplash.com/photo-1616165873517-5e60d5b78d91"},{n:"DOGE",p:1,img:"https://images.unsplash.com/photo-1644033620970-13f8d38686e0"}]
        };

        function render() {
            let html = "";
            for (let cat in data) {
                html += `<h3>${cat}</h3><div class="grid">`;
                data[cat].forEach(i => {
                    html += `<div class="card"><img src="${i.img}"><p>${i.n}<br>$${i.p.toLocaleString()}</p>
                    <button class="btn buy" onclick="buy('${i.n}', ${i.p}, '${cat}')">Купить</button>
                    <button class="btn sell" onclick="sell('${i.n}', ${i.p}, '${cat}')">Продать</button></div>`;
                });
                html += `</div>`;
            }
            document.getElementById('content').innerHTML = html;
        }

        function tap() { balance += clickVal; update(); }
        function upgrade() { 
            if(balance >= upgradeCost && clickVal < 50) { 
                balance -= upgradeCost; 
                clickVal += 10; 
                upgradeCost += 100; 
                update(); 
            } else if(clickVal >= 50) { alert("Максимальный уровень!"); }
            else alert("Нет денег!"); 
        }
        function buy(n, p, cat) { if(balance >= p) { balance -= p; inv[n] = (inv[n] || 0) + 1; update(); } else alert("Нет денег!"); }
        function sell(n, p, cat) { if(inv[n] > 0) { balance += (cat.includes("Акции") || cat.includes("Крипта")) ? p : p * 0.95; inv[n]--; update(); } }
        function update() { 
            document.getElementById('bal').innerText = "💰 $" + Math.floor(balance).toLocaleString(); 
            document.getElementById('clickValDisp').innerText = clickVal; 
            const btn = document.getElementById('upgradeBtn');
            if(clickVal >= 50) {
                document.getElementById('upgradeText').innerText = "Максимальный апгрейд!";
                btn.disabled = true; btn.style.background = "#222";
            } else {
                document.getElementById('upgradeText').innerText = "Апгрейд: $" + upgradeCost + " (Сила +" + (clickVal + 10) + ")";
            }
            render(); 
        }
        
        setInterval(() => alert("⚠️ РЕКЛАМА: Поддержи игру!"), 120000);
        render();
    </script>
</body>
</html>
