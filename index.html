<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luxury Tycoon Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <style>
        :root {
            --bg-deep: #080a0d;
            --bg-card: #12161c;
            --primary: #fcd535;
            --primary-dim: rgba(252, 213, 53, 0.1);
            --green: #0ecb81;
            --green-dim: rgba(14, 203, 129, 0.1);
            --text-main: #eaecef;
            --text-sec: #848e9c;
            --border: #2b2f36;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-deep); color: var(--text-main); font-size: 14px; line-height: 1.4; min-height: 100vh; overflow-x: hidden; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

        .screen { display: none; width: 100%; min-height: 100vh; padding: 15px; }
        .active { display: flex; flex-direction: column; }

        #startScreen { justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a2029 0%, var(--bg-deep) 100%); padding: 40px 20px; text-align: center; }
        #startScreen h1 { font-size: 32px; font-weight: 800; color: #fff; letter-spacing: -1px; margin-bottom: 8px; }
        #startScreen h2 { font-size: 14px; font-weight: 600; color: var(--primary); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 60px; }
        
        .btn { display: flex; justify-content: center; align-items: center; width: 100%; max-width: 320px; height: 56px; margin: 12px 0; font-size: 18px; font-weight: 700; border: none; border-radius: 28px; cursor: pointer; transition: all 0.2s ease; }
        .btn-main { background-color: var(--primary); color: #000; box-shadow: 0 6px 20px rgba(252, 213, 53, 0.3); }
        .btn-main:active { transform: translateY(2px); }
        .btn-sec { background-color: transparent; color: #fff; border: 2px solid #555; }

        .header { background-color: var(--bg-card); padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 15px; z-index: 100; margin-bottom: 15px; border: 1px solid var(--border); }
        .balance { color: var(--green); font-size: 24px; font-weight: 800; }
        .balance::before { content: "💵 "; font-size: 20px; }

        .tap-area { background: linear-gradient(135deg, #212833, #12161c); border: 2px solid var(--primary); border-radius: 16px; padding: 25px; text-align: center; margin-bottom: 20px; cursor: pointer; transition: transform 0.05s ease; }
        .tap-area:active { transform: scale(0.97); }
        .tap-area h3 { color: var(--primary); font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        .tap-area p { color: var(--text-sec); font-size: 13px; }

        .ad-timer-notice { font-size: 12px; color: var(--text-sec); text-align: center; margin-bottom: 15px; font-weight: bold; }

        .section-header { display: flex; align-items: center; gap: 8px; margin: 25px 0 12px 5px; }
        .section-title { color: var(--primary); font-size: 16px; font-weight: 700; }

        .market-card { background-color: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .market-info { flex-grow: 1; min-width: 0; }
        .market-name { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 4px; }
        .market-price-ow { font-size: 13px; color: var(--green); font-weight: 600; }
        .market-owned { font-size: 12px; color: var(--text-sec); margin-left: 5px; }
        .market-actions { display: flex; gap: 8px; }
        .m-btn { width: 42px; height: 42px; border-radius: 10px; border: none; font-size: 20px; font-weight: 700; cursor: pointer; }
        .btn-plus { background-color: var(--primary-dim); color: var(--primary); }
        .btn-minus { background-color: var(--green-dim); color: var(--green); }

        .horizontal-scroller { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .horizontal-scroller::-webkit-scrollbar { display: none; }
        
        .item-card { background-color: var(--bg-card); border-radius: 14px; border: 1px solid var(--border); width: 160px; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; }
        .item-image { width: 100%; height: 100px; background-size: cover; background-position: center; background-color: #2b2f36; }
        .item-meta { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .item-name { font-size: 13px; font-weight: 700; color: #fff; }
        .item-price { color: var(--primary); font-size: 14px; font-weight: 800; }
        .item-buy { width: 100%; height: 32px; background-color: var(--primary); color: #000; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }

        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-end; }
        .popup-overlay.active { display: flex; }
        .settings-popup { background-color: #1a2029; width: 100%; border-radius: 20px 20px 0 0; padding: 25px 20px; border-top: 1px solid var(--border); }
        .popup-title { font-size: 18px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 20px; }
        .lang-item { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; }
        .lang-item.selected { border-color: var(--primary); background-color: var(--primary-dim); color: var(--primary); }
    </style>
</head>
<body>

    <div id="startScreen" class="screen active">
        <h1 id="menuTitle">💎 ИМПЕРИЯ ПЕРЕКУПА</h1>
        <h2 id="menuSub">TELEGRAM EDITION</h2>
        <button class="btn btn-main" id="playBtn" onclick="startGame()">▶ ИГРАТЬ</button>
        <button class="btn btn-sec" id="settingsBtn" onclick="openSettings()">⚙ НАСТРОЙКИ</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="header">
            <div class="balance" id="balanceDisplay">$120,000</div>
        </div>

        <div class="tap-area" onclick="handleTap(event)">
            <h3 id="clickTitle">💸 КЛИКАЙ ДЛЯ ЗАРАБОТКА 💸</h3>
            <p id="clickSub">Нажми, чтобы получить +$200</p>
        </div>
        <div class="ad-timer-notice" id="adNotice">До авто-рекламы: <span id="adTimer">120</span>с</div>

        <div class="section-header"><span class="section-title" id="titleCrypto">Криптовалюта (Живой курс)</span></div>
        <div id="cryptoContainer"></div>

        <div class="section-header"><span class="section-title" id="titleStocks">Акции брендов (Живой курс)</span></div>
        <div id="stocksContainer"></div>

        <div class="section-header"><span class="section-title" id="catCars">Автосалон</span></div>
        <div class="horizontal-scroller" id="carsContainer"></div>

        <div class="section-header"><span class="section-title" id="catApartments">Элитные Квартиры</span></div>
        <div class="horizontal-scroller" id="apartmentsContainer"></div>

        <div class="section-header"><span class="section-title" id="catHouses">Особняки и Дома</span></div>
        <div class="horizontal-scroller" id="housesContainer"></div>
    </div>

    <div id="popupOverlay" class="popup-overlay" onclick="closeSettings()">
        <div class="settings-popup">
            <div class="popup-title" id="langPopupTitle">Выбор языка / Language</div>
            <div id="langRu" class="lang-item selected" onclick="selectLanguage('ru')"><span>🇷🇺 Русский</span></div>
            <div id="langEn" class="lang-item" onclick="selectLanguage('en')"><span>🇺🇸 English</span></div>
            <button class="btn btn-sec" id="popupBack" style="margin-top:15px; width:100%;" onclick="closeSettings()">Назад / Back</button>
        </div>
    </div>

    <script>
        let balance = 120000;
        let clickPower = 200;
        let currentLang = 'ru';
        let adSecondsLeft = 120;

        const IMG_PRE = "url('https://images.unsplash.com/photo-";
        const IMG_SUF = "?w=300&q=80&auto=format&fit=crop')";
        
        const cryptoMarket = [
            { id: 'btc', name: 'Bitcoin (BTC)', price: 62000.0, owned: 0 },
            { id: 'eth', name: 'Ethereum (ETH)', price: 3400.0, owned: 0 },
            { id: 'ton', name: 'Toncoin (TON)', price: 7.2, owned: 0 }
        ];

        const stockMarket = [
            { id: 'appl', name: 'Apple Inc.', price: 185.0, owned: 0 },
            { id: 'tsla', name: 'Tesla (TSLA)', price: 170.0, owned: 0 }
        ];

        const carsData = [
            { name: "ВАЗ 2107", price: 1800, img: IMG_PRE+"1616422285623-13ff0162193c"+IMG_SUF },
            { name: "Opel Astra G", price: 4200, img: IMG_PRE+"1568605114967-8130f3a36994"+IMG_SUF },
            { name: "Mercedes W210", price: 7000, img: IMG_PRE+"1618843479313-40f8afb4b4d8"+IMG_SUF },
            { name: "Toyota RAV4 Long", price: 14500, img: IMG_PRE+"1606575953904-a156f643494a"+IMG_SUF },
            { name: "BMW 5 Series E60", price: 17500, img: IMG_PRE+"1525609004556-c46c7d6cf0a3"+IMG_SUF },
            { name: "BMW M5 F90", price: 130000, img: IMG_PRE+"1619362280286-f1f8fd5032ed"+IMG_SUF },
            { name: "Bugatti Chiron", price: 3200000, img: IMG_PRE+"1600706432502-75a0e2b3b99a"+IMG_SUF }
        ];

        const apartmentsData = [
            { name: "Студия в пригороде", price: 45000, img: IMG_PRE+"1522708323590-d24dbb6b0267"+IMG_SUF },
            { name: "2-комнатная в Центре", price: 120000, img: IMG_PRE+"1502672260266-1c1ef2d93688"+IMG_SUF }
        ];

        const housesData = [
            { name: "Современная Вилла", price: 280000, img: IMG_PRE+"1600596542815-ffad4c1539a9"+IMG_SUF },
            { name: "Особняк Beverly", price: 1500000, img: IMG_PRE+"1600585154526-990dced4db0d"+IMG_SUF }
        ];

        const locales = {
            ru: { menuTitle: "ИМПЕРИЯ ПЕРЕКУПА", playBtn: "▶ ИГРАТЬ", settingsBtn: "⚙ НАСТРОЙКИ", langPopupTitle: "Выбор языка / Language", popupBack: "Назад", clickTitle: "💸 КЛИКАЙ ДЛЯ ЗАРАБОТКА 💸", clickSub: "Нажми, чтобы получить +$200", titleCrypto: "Криптовалюта (Живой курс)", titleStocks: "Акции брендов (Живой курс)", catCars: "Автосалон", catApartments: "Элитные Квартиры", catHouses: "Особняки и Дома", buyBtn: "Купить" },
            en: { menuTitle: "LUXURY TYCOON", playBtn: "▶ PLAY GAME", settingsBtn: "⚙ SETTINGS", langPopupTitle: "Select Language", popupBack: "Back", clickTitle: "💸 TAP TO EARN PROFIT 💸", clickSub: "Tap to receive +$200", titleCrypto: "Cryptocurrency (Live)", titleStocks: "Brand Stocks (Live)", catCars: "Car Dealership", catApartments: "Luxury Apartments", catHouses: "Mansions & Houses", buyBtn: "Buy" }
        };

        function formatMoney(amount) { return '$' + amount.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function updateBalanceDisplay() { document.getElementById('balanceDisplay').innerText = formatMoney(balance); }
        function showScreen(screenId) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(screenId).classList.add('active'); }
        
        function openSettings() { document.getElementById('popupOverlay').classList.add('active'); }
        function closeSettings() { document.getElementById('popupOverlay').classList.remove('active'); }
        
        function selectLanguage(lang) {
            currentLang = lang;
            document.getElementById('langRu').classList.toggle('selected', lang === 'ru');
            document.getElementById('langEn').classList.toggle('selected', lang === 'en');
            updateLocalization();
        }

        function updateLocalization() {
            const t = locales[currentLang];
            for (let id in t) { const el = document.getElementById(id); if (el) el.innerText = t[id]; }
            renderAllScrollers();
        }

        function startGame() {
            showScreen('gameScreen');
            updateLocalization();
            updateBalanceDisplay();
            renderMarkets();
            
            // Запуск таймеров курса и рекламы
            setInterval(() => {
                cryptoMarket.forEach(c => c.price *= (1 + (Math.random() * 0.12 - 0.06)));
                stockMarket.forEach(s => s.price *= (1 + (Math.random() * 0.08 - 0.04)));
                renderMarkets();
            }, 3000);

            setInterval(() => {
                adSecondsLeft--;
                document.getElementById('adTimer').innerText = adSecondsLeft;
                if (adSecondsLeft <= 0) {
                    adSecondsLeft = 120;
                    alert("⚠️ [РЕКЛАМА ADSGRAM] Здесь сработал автоматический межстраничный показ!");
                }
            }, 1000);
        }

        function handleTap(e) {
            balance += clickPower;
            updateBalanceDisplay();
        }

        function renderMarkets() {
            const renderList = (data, containerId, type) => {
                const container = document.getElementById(containerId);
                let html = '';
                data.forEach((item, index) => {
                    html += `
                        <div class="market-card">
                            <div class="market-info">
                                <div class="market-name">${item.name}</div>
                                <div class="market-price-ow">$${item.price.toFixed(2)}<span class="market-owned">(В наличии: ${item.owned})</span></div>
                            </div>
                            <div class="market-actions">
                                <button class="m-btn btn-plus" onclick="buyMarket('${type}', ${index})">+</button>
                                <button class="m-btn btn-minus" onclick="sellMarket('${type}', ${index})">−</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            };
            renderList(cryptoMarket, 'cryptoContainer', 'crypto');
            renderList(stockMarket, 'stocksContainer', 'stock');
        }

        function buyMarket(type, index) {
            const item = type === 'crypto' ? cryptoMarket[index] : stockMarket[index];
            if (balance >= item.price) { balance -= item.price; item.owned++; updateBalanceDisplay(); renderMarkets(); }
        }

        function sellMarket(type, index) {
            const item = type === 'crypto' ? cryptoMarket[index] : stockMarket[index];
            if (item.owned > 0) { item.owned--; balance += item.price; updateBalanceDisplay(); renderMarkets(); }
        }

        function renderAllScrollers() {
            renderScroller('carsContainer', carsData);
            renderScroller('apartmentsContainer', apartmentsData);
            renderScroller('housesContainer', housesData);
        }

        function renderScroller(containerId, data) {
            const container = document.getElementById(containerId);
            let html = '';
            data.forEach(item => {
                html += `
                    <div class="item-card">
                        <div class="item-image" style="background-image: ${item.img}"></div>
                        <div class="item-meta">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">${formatMoney(item.price)}</div>
                            <button class="item-buy" onclick="buyItem('${item.name}', ${item.price})">${locales[currentLang].buyBtn}</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function buyItem(name, price) {
            if (balance >= price) { balance -= price; updateBalanceDisplay(); alert(`Успешно куплено: ${name}!`); } 
            else { alert("Недостаточно денег!"); }
        }

        updateLocalization();
    </script>
</body>
</html>
