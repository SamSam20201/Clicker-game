<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Empire</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .header { text-align: center; font-size: 20px; color: var(--gold); padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: #151515; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .card img { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; }
        .btn { border: none; padding: 6px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 48%; font-size: 12px; }
        .buy { background: var(--gold); color: #000; }
        .sell { background: #333; color: #fff; }
    </style>
</head>
<body>
    <div class="header" id="bal">💰 $30,000</div>
    <div style="text-align:center; padding:10px">
        <button onclick="tap()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold">КЛИК (+$<span id="clickValDisp">10</span>)</button>
        <p id="upgradeText">Апгрейд: $100</p>
        <button onclick="upgrade()" id="upgBtn">КУПИТЬ АПГРЕЙД</button>
    </div>
    <div id="content"></div>

    <script>
        let balance = 30000; let clickVal = 10; let upgradeCost = 100;
        let inv = {};

        // Список с проверенными прямыми ссылками на авто и товары
        const cars = [
            {n:"BMW", p:10000, img:"https://images.unsplash.com/photo-1555215695-3004980ad54e"},
            {n:"Audi", p:12000, img:"https://images.unsplash.com/photo-1541348263662-e068662d82ab"},
            {n:"Mers", p:15000, img:"https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8"},
            {n:"Ferrari", p:50000, img:"https://images.unsplash.com/photo-1592198084033-ade902d1aae0"},
            {n:"Lambo", p:60000, img:"https://images.unsplash.com/photo-1544829099-b9a0c07fad1a"},
            {n:"Porsche", p:40000, img:"https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e"},
            {n:"Bugatti", p:200000, img:"https://images.unsplash.com/photo-1600706432502-75a0e2b3b99a"},
            {n:"Tesla", p:35000, img:"https://images.unsplash.com/photo-1560958089-b8a1929cea89"},
            {n:"Aston", p:80000, img:"https://images.unsplash.com/photo-1603584173870-7f23fdae1dda"},
            {n:"Ford", p:8000, img:"https://images.unsplash.com/photo-1506377872008-6645d9d29ef7"},
            {n:"Honda", p:7000, img:"https://images.unsplash.com/photo-1591465203743-a1170d30b957"},
            {n:"Toyota", p:9000, img:"https://images.unsplash.com/photo-1621351182283-e07e868c2929"},
            {n:"Bentley", p:110000, img:"https://images.unsplash.com/photo-1621007947382-cc347941150e"},
            {n:"Rolls", p:150000, img:"https://images.unsplash.com/photo-1617531653332-bd46c24f2068"},
            {n:"McLaren", p:120000, img:"https://images.unsplash.com/photo-1621135802920-133df287f89c"},
            {n:"Jaguar", p:45000, img:"https://images.unsplash.com/photo-1563720223185-11003d516935"},
            {n:"Maserati", p:48000, img:"https://images.unsplash.com/photo-1619362280286-f1f8fd5032ed"},
            {n:"Lotus", p:38000, img:"https://images.unsplash.com/photo-1520050206274-a1ae446cb3cc"},
            {n:"Pagani", p:250000, img:"https://images.unsplash.com/photo-1583121274602-3e2820c69888"},
            {n:"Koenig", p:300000, img:"https://images.unsplash.com/photo-1632245889029-e406faaa34cd"}
        ];

        function render() {
            let html = "<h3>🏎 Суперкары (20)</h3><div class='grid'>";
            cars.forEach(i => {
                html += `<div class="card"><img src="${i.img}" loading="lazy"><p>${i.n}<br>$${i.p.toLocaleString()}</p>
                <button class="btn buy" onclick="buy('${i.n}', ${i.p})">Buy</button>
                <button class="btn sell" onclick="sell('${i.n}', ${i.p})">Sell</button></div>`;
            });
            document.getElementById('content').innerHTML = html + "</div>";
        }

        function tap() { balance += clickVal; update(); }
        function upgrade() { if(balance >= upgradeCost && clickVal < 50) { balance -= upgradeCost; clickVal += 10; upgradeCost += 100; update(); } }
        function buy(n, p) { if(balance >= p) { balance -= p; inv[n] = (inv[n] || 0) + 1; update(); } }
        function sell(n, p) { if(inv[n] > 0) { balance += p * 0.95; inv[n]--; update(); } }
        function update() { 
            document.getElementById('bal').innerText = "💰 $" + Math.floor(balance).toLocaleString();
            document.getElementById('clickValDisp').innerText = clickVal;
            document.getElementById('upgradeText').innerText = "Upgrade: $" + upgradeCost;
            render();
        }
        render();
    </script>
</body>
</html>
