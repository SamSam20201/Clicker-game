<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Жизнь: 100 лет пути</title>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: Arial;
    color: white;
}

.card {
    width: 360px;
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

#avatar { font-size: 60px; margin: 10px; }

.stat {
    font-size: 14px;
    margin: 5px;
    color: #cbd5e1;
}

.log {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 15px 0;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.opt { background: #3b82f6; color: white; }
.ad { background: #f59e0b; color: black; }
</style>
</head>

<body>

<div class="card">
    <div id="avatar">👶</div>

    <div id="age">Возраст: 1</div>

    <div class="stat" id="stats">
        💰 Деньги: 0 | ❤️ Счастье: 50 | 🩺 Здоровье: 100
    </div>

    <div class="log" id="text">Ты родился. Что дальше?</div>

    <button class="opt" id="b1" onclick="choose(1)">Вариант 1</button>
    <button class="opt" id="b2" onclick="choose(2)">Вариант 2</button>
    <button class="ad" onclick="adReward()">🎁 Реклама (риск/награда)</button>
</div>

<script>
let age = 1;
let gameOver = false;

let stats = {
    money: 0,
    happiness: 50,
    health: 100
};

const ad = window.Adsgram ? window.Adsgram.init({ blockId: "ТВОЙ_BLOCK_ID" }) : null;

function eventText(a) {
    if (a < 7) return "Детство. Всё новое и странное.";
    if (a < 18) return "Школа, друзья и первые решения.";
    if (a < 30) return "Пора строить жизнь и карьеру.";
    if (a < 60) return "Взрослая жизнь с нагрузкой.";
    if (a < 90) return "Переоценка жизни и результатов.";
    return "Финальные годы. Итоги уже близко.";
}

function updateUI() {
    document.getElementById("age").innerText = "Возраст: " + age;

    document.getElementById("stats").innerText =
        `💰 ${stats.money} | ❤️ ${stats.happiness} | 🩺 ${stats.health}`;

    document.getElementById("text").innerText =
        "Тебе " + age + " лет. " + eventText(age);

    if (age < 12) document.getElementById("avatar").innerText = "🧒";
    else if (age < 20) document.getElementById("avatar").innerText = "🧑";
    else if (age < 60) document.getElementById("avatar").innerText = "👨‍💼";
    else document.getElementById("avatar").innerText = "👴";

    document.getElementById("b1").innerText = "Работать";
    document.getElementById("b2").innerText = "Отдыхать";
}

function checkDeath() {
    if (stats.health <= 0 || stats.happiness <= 0) {
        gameOver = true;
        document.getElementById("text").innerText =
            "💀 Ты умер. Игра окончена.";
    }

    if (age >= 100) {
        gameOver = true;
        document.getElementById("text").innerText =
            `🏁 Конец жизни. Деньги: ${stats.money}, Счастье: ${stats.happiness}`;
    }
}

function nextYear() {
    if (gameOver) return;

    age++;

    // базовое ухудшение/изменение
    stats.happiness -= 2;
    stats.health -= 1;

    updateUI();
    checkDeath();
}

function choose(type) {
    if (gameOver) return;

    if (type === 1) {
        stats.money += 20;
        stats.happiness -= 5;
    } else {
        stats.happiness += 5;
        stats.health -= 2;
    }

    nextYear();
}

function adReward() {
    if (gameOver) return;

    if (!ad) {
        stats.money += 100;
        stats.happiness -= 5;
        nextYear();
        return;
    }

    ad.show().then(res => {
        if (res && res.done) {
            stats.money += 200;
            stats.happiness += 10;
            document.getElementById("text").innerText =
                "🎁 Реклама дала тебе бонус!";
            setTimeout(nextYear, 1000);
        }
    }).catch(() => {
        stats.money += 50;
        nextYear();
    });
}

updateUI();
</script>

</body>
</html>
